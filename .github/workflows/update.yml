name: 印西ニュース 自動更新

on:
  schedule:
    # 6時・10時・13時・17時（日本時間）に実行
    - cron: "0 21,1,4,8 * * *"
  # 手動実行も可能
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: RSSを収集してJSONに保存
        run: python fetch_rss.py

      - name: サイトを生成（フォールバック用）
        run: python generate_site.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html articles_raw.json
          git diff --staged --quiet || git commit -m "自動更新: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push --force
